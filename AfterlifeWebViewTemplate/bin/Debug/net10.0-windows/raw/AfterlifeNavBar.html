<!DOCTYPE html>
<html><head>
    <meta charset="utf-8">
    <title>Navbar</title>

    <style>
        html, body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            background: transparent;
            font-family: "Segoe UI", sans-serif;
        }

        /* Hide scrollbars */
        ::-webkit-scrollbar {
            display: none;
        }

        #navbar {
            width: 100%;
            height: 40px;

            display: flex;
            align-items: center;

            padding: 8px;
            box-sizing: border-box;

            background: rgba(5, 5, 5, 1);
            backdrop-filter: blur(20px);
        }

        .btn {
            width: 23px;
            height: 23px;

            margin-right: 6px;

            border: none;
            border-radius: 50%;

            background: rgb(40, 40, 40);
            color: white;

            cursor: pointer;
            font-size: 7px;
        }

        .btn:hover {
            background: rgb(60, 60, 60);
        }

        #urlbar {
            flex: 1;

            height: 20px;

            border: none;
            outline: none;

            border-radius: 18px;

            padding-left: 12px;

            background: rgb(30, 30, 30);
            color: white;

            margin: 0 8px;
        }

        #window-controls {
            display: flex;
            gap: 6px;
        }

        .close {
            background: rgb(180, 50, 50);
        }

        .close:hover {
            background: rgb(220, 60, 60);
        }
    </style>
</head>

<body>

    <div id="navbar">

        <!-- Back / Forward -->
        <button class="btn" onclick="back()">←</button>
        <button class="btn" onclick="forward()">→</button>

        <!-- URL BAR -->
        <input id="urlbar" type="text" placeholder="Enter URL..." onkeydown="handleKey(event)">

        <!-- Window controls -->
        <div id="window-controls">

            <button class="btn" onclick="minimize()">─</button>
            <button class="btn" onclick="maximize()">⬜</button>
            <button class="btn close" onclick="closeApp()">✕</button>

        </div>

    </div>

    <script>
        function handleKey(e) {
            if (e.key === "Enter") {
                window.chrome.webview.postMessage(
                    "navigate|" + document.getElementById("urlbar").value
                );
            }
        }

        function back() {
            window.chrome.webview.postMessage("back");
        }

        function forward() {
            window.chrome.webview.postMessage("forward");
        }

        function minimize() {
            window.chrome.webview.postMessage("minimize");
        }

        function maximize() {
            window.chrome.webview.postMessage("maximize");
        }

        function closeApp() {
            window.chrome.webview.postMessage("close");
        }

        // Called from C#
        function setUrl(url) {
            document.getElementById("urlbar").value = url;
        }
    </script>


</body></html>
